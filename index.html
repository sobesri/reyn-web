<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Reyn Atelier</title>

    <!-- SEO -->
    <meta name="description" content="Reyn Atelier - premium oversized tees and streetwear essentials. Redefine the standard." />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (social sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Reyn Atelier" />
    <meta property="og:description" content="Premium oversized tees and streetwear essentials. Redefine the standard." />
    <meta property="og:image" content="/favicon.png" />
    <meta property="og:site_name" content="Reyn Atelier" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Reyn Atelier" />
    <meta name="twitter:description" content="Premium oversized tees and streetwear essentials. Redefine the standard." />
    <meta name="twitter:image" content="/favicon.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ClothingStore",
      "name": "Reyn Atelier",
      "description": "Premium oversized tees and streetwear essentials. Redefine the standard.",
      "sameAs": [
        "https://www.instagram.com/reynatelierofficial",
        "https://www.tiktok.com/@reynatelierofficial"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
